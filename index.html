<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>تحميل تطبيق الظلال</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* reset & base */
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --sky-deep: #0a1626;
      --sky-mid: #142b46;
      --sky-edge: #1c3a5e;
      --horizon: #ff8a5c;
      --horizon-dim: rgba(255,138,92,0.25);
      --runway: #ffd166;
      --text: #eaf1fb;
      --text-dim: #92a8c4;
      --text-faint: #5d7392;
      --glass: rgba(255,255,255,0.07);
      --glass-bright: rgba(255,255,255,0.14);
      --glass-border: rgba(255,255,255,0.16);
      --glass-border-bright: rgba(255,255,255,0.3);
      --blur: saturate(180%) blur(24px);
      --blur-heavy: saturate(200%) blur(40px);
    }
    html, body { height:100%; }
    body {
      font-family: 'IBM Plex Sans Arabic', sans-serif;
      background: var(--sky-deep);
      color: var(--text);
      overflow: hidden;
      position: relative;
      -webkit-font-smoothing: antialiased;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    @media (prefers-reduced-motion: reduce) {
      * { animation-duration: .01ms !important; animation-iteration-count: 1 !important; transition-duration: .01ms !important; }
    }

    /* backdrop sky */
    .sky {
      position: fixed; inset:0; z-index:0;
      background:
        radial-gradient(ellipse 120% 60% at 50% 100%, var(--horizon-dim) 0%, transparent 55%),
        linear-gradient(180deg, var(--sky-deep) 0%, var(--sky-mid) 55%, var(--sky-edge) 100%);
    }
    .stars {
      position: fixed; inset:0; z-index:0; pointer-events:none;
    }
    .star {
      position: absolute; border-radius:50%; background:#fff;
      animation: twinkle 3.4s ease-in-out infinite;
    }
    @keyframes twinkle { 0%,100%{opacity:.15} 50%{opacity:.75} }

    /* ── هاتف طويل (نسبة 9:19.5) ── */
    .phone-frame {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 380px;
      aspect-ratio: 9 / 19.5;    /* طويل ونحيف مثل الهواتف الحديثة */
      max-height: 96vh;
      background: #0d1a2b;
      border-radius: 36px;
      box-shadow: 0 25px 70px rgba(0,0,0,0.8), 0 0 0 2px rgba(255,255,255,0.04);
      padding: 12px 8px 10px 8px;
      display: flex;
      flex-direction: column;
      pointer-events: none;
      transition: all 0.2s;
    }
    .phone-frame > * { pointer-events: auto; }

    /* حاوية المحتوى (فيديو + كارد) */
    .app-inner {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;  /* المحتوى يبدأ من الأعلى */
      gap: 6px;                    /* مسافة صغيرة بين الفيديو والكارد */
      overflow: hidden;
      border-radius: 28px;
      background: transparent;
    }

    /* ── مشغل الفيديو (يعلو) ── */
    .video-stage {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.6);
      flex-shrink: 0;
    }
    #mainVideo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .video-scrim {
      position: absolute; inset:0; z-index:2; pointer-events:none;
      background:
        linear-gradient(180deg, rgba(8,14,24,0.3) 0%, transparent 30%, transparent 70%, rgba(8,14,24,0.4) 100%);
    }

    /* ── شريط الحالة العلوي (لوحة المغادرة) ── */
    .board {
      position: absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 30;
      display: flex;
      align-items: center;
      gap: 0;
      border-radius: 14px;
      overflow: hidden;
      background: var(--glass);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border: 1px solid var(--glass-border);
      box-shadow: 0 6px 20px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.15);
      pointer-events: none;
      white-space: nowrap;
    }
    .board-seg {
      padding: 5px 10px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: .55rem;
      letter-spacing: .04em;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .board-seg.label { color: var(--text-faint); border-left: 1px solid rgba(255,255,255,0.08); }
    .board-seg.status { color: var(--runway); font-weight: 600; }
    .board-dot {
      width: 5px; height: 5px; border-radius: 50%; background: var(--runway);
      box-shadow: 0 0 8px var(--runway);
      animation: pulseDot 1.4s ease-in-out infinite;
    }
    @keyframes pulseDot { 0%,100%{opacity:1} 50%{opacity:.3} }
    .board-seg.status.done { color: #7be8a4; }
    .board-seg.status.done .board-dot { background: #7be8a4; box-shadow: 0 0 8px #7be8a4; animation: none; }
    .board-seg.status .status-text {
      display: inline-block;
      animation: flipIn .5s cubic-bezier(.2,.8,.2,1);
    }
    @keyframes flipIn {
      0%{ opacity:0; transform:rotateX(70deg) translateY(-4px); filter:blur(2px); }
      100%{ opacity:1; transform:rotateX(0) translateY(0); filter:blur(0); }
    }

    /* ── زر الصوت الاحتياطي (داخل الفيديو) ── */
    .sound-fallback {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 30;
      display: none;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 50px;
      background: var(--glass-bright);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border: 1px solid var(--glass-border-bright);
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      font-size: .6rem;
      color: var(--text);
      cursor: pointer;
      animation: fadeIn .4s ease;
      pointer-events: auto;
    }
    .sound-fallback.show { display: flex; }
    @keyframes fadeIn { from{ opacity:0; transform:translate(-50%, 6px); } to{ opacity:1; transform:translate(-50%,0); } }
    .sound-fallback i { color: var(--horizon); }

    /* ── الكارد السفلي (يلي الفيديو بمسافة بسيطة) ── */
    .sheet {
      width: 100%;
      flex-shrink: 0;
      pointer-events: none;
    }
    .sheet-inner {
      width: 100%;
      pointer-events: auto;
      border-radius: 18px 18px 16px 16px;
      background: var(--glass);
      backdrop-filter: var(--blur-heavy);
      -webkit-backdrop-filter: var(--blur-heavy);
      border: 1px solid var(--glass-border);
      box-shadow:
        0 -4px 24px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.18),
        inset 0 -1px 0 rgba(255,255,255,0.04);
      padding: 10px 14px 14px 14px;
      position: relative;
      overflow: hidden;
    }
    .sheet-inner::before {
      content:''; position:absolute; top:0; left:0; right:0; height:1px;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.4), transparent);
    }
    .sheet-grip {
      width: 28px; height: 3px; border-radius: 4px;
      background: rgba(255,255,255,0.15);
      margin: 0 auto 6px;
    }

    /* حالة المشاهدة */
    .state-watching { display: flex; flex-direction: column; gap: 5px; }
    .watching-row {
      display: flex; align-items: center; gap: 10px;
    }
    .watching-icon {
      width: 26px; height: 26px; border-radius: 10px; flex-shrink: 0;
      background: rgba(255,138,92,0.14);
      border: 1px solid rgba(255,138,92,0.2);
      display: flex; align-items: center; justify-content: center;
      color: var(--horizon); font-size: .75rem;
    }
    .watching-text { flex: 1; }
    .watching-title {
      font-size: .7rem; font-weight: 600; color: var(--text); margin-bottom: 0px;
    }
    .watching-sub {
      font-size: .55rem; color: var(--text-dim); line-height: 1.2;
    }
    .progress-track {
      position: relative; height: 3px; border-radius: 3px;
      background: rgba(255,255,255,0.1);
      overflow: hidden;
    }
    .progress-fill {
      position: absolute; inset:0 auto 0 0; width:0%;
      background: linear-gradient(90deg, var(--horizon), var(--runway));
      border-radius: 3px;
      transition: width .15s linear;
    }
    .progress-meta {
      display: flex; justify-content: space-between;
      font-family: 'IBM Plex Mono', monospace;
      font-size: .5rem; color: var(--text-faint); letter-spacing: .04em;
    }

    /* حالة جاهز للتحميل */
    .state-ready {
      display: none; flex-direction: column; gap: 8px;
      text-align: right;
    }
    .state-ready.show { display: flex; animation: sheetReveal .45s cubic-bezier(.2,.8,.2,1); }
    @keyframes sheetReveal {
      0%{ opacity:0; transform:translateY(10px); filter:blur(4px); }
      100%{ opacity:1; transform:translateY(0); filter:blur(0); }
    }
    .ready-row {
      display: flex; align-items: center; gap: 10px;
    }
    .ready-icon {
      width: 30px; height: 30px; border-radius: 10px; flex-shrink: 0;
      background: rgba(123,232,164,0.14);
      border: 1px solid rgba(123,232,164,0.25);
      display: flex; align-items: center; justify-content: center;
      color: #7be8a4; font-size: .85rem;
    }
    .ready-title {
      font-size: .75rem; font-weight: 700; color: var(--text); margin-bottom: 0px;
    }
    .ready-sub {
      font-size: .55rem; color: var(--text-dim);
    }

    .download-btn {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      width: 100%; padding: 10px 14px; border-radius: 14px;
      background: linear-gradient(135deg, rgba(255,138,92,0.95), rgba(255,209,102,0.95));
      color: #1a1206; font-size: .75rem; font-weight: 700;
      box-shadow: 0 6px 18px rgba(255,138,92,0.3), inset 0 1px 0 rgba(255,255,255,0.3);
      transition: transform .2s, box-shadow .2s;
      text-decoration: none;
    }
    .download-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 26px rgba(255,138,92,0.4); }
    .download-btn:active { transform: translateY(0) scale(.98); }

    .replay-link {
      display: flex; align-items: center; justify-content: center; gap: 5px;
      font-size: .55rem; color: var(--text-dim);
      padding: 3px; background: none; border: none;
      cursor: pointer;
      width: 100%;
    }
    .replay-link:hover { color: var(--text); }

    /* تحسينات للشاشات الصغيرة جداً */
    @media (max-width: 400px) {
      .phone-frame { max-width: 340px; border-radius: 30px; padding: 8px 4px; }
      .board-seg { padding: 4px 8px; font-size: .5rem; }
      .sheet-inner { padding: 8px 10px 12px; border-radius: 14px 14px 12px 12px; }
    }
    @media (min-width: 600px) {
      .phone-frame { max-width: 420px; }
    }
    /* تسهيل الوصول */
    a:focus-visible, button:focus-visible {
      outline: 2px solid var(--runway);
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <div class="sky"></div>
  <div class="stars" id="stars"></div>

  <!-- إطار الهاتف الطويل -->
  <div class="phone-frame">
    <div class="app-inner">
      <!-- مشغل الفيديو -->
      <div class="video-stage">
        <video id="mainVideo" playsinline webkit-playsinline preload="auto">
          <source src="open_video.mp4" type="video/mp4">
        </video>
        <div class="video-scrim"></div>

        <!-- لوحة الحالة العلوية -->
        <div class="board" id="board">
          <div class="board-seg label"><i class="fas fa-plane-departure"></i> العرض</div>
          <div class="board-seg status" id="boardStatus">
            <span class="board-dot"></span>
            <span class="status-text" id="boardStatusText">يتم التشغيل</span>
          </div>
        </div>

        <!-- زر الصوت الاحتياطي -->
        <div class="sound-fallback" id="soundFallback">
          <i class="fas fa-volume-xmark"></i>
          <span>اضغط لتشغيل الصوت</span>
        </div>
      </div>

      <!-- الكارد السفلي (يأتي بعد الفيديو بمسافة 6px) -->
      <div class="sheet">
        <div class="sheet-inner">
          <div class="sheet-grip"></div>

          <!-- حالة المشاهدة -->
          <div class="state-watching" id="stateWatching">
            <div class="watching-row">
              <div class="watching-icon"><i class="fas fa-headphones"></i></div>
              <div class="watching-text">
                <div class="watching-title">يُرجى سماع الفيديو حتى النهاية</div>
                <div class="watching-sub">سيظهر رابط التحميل بعد انتهاء العرض</div>
              </div>
            </div>
            <div class="progress-track">
              <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-meta">
              <span id="timeElapsed">٠:٠٠</span>
              <span id="timeTotal">٠:٠٠</span>
            </div>
          </div>

          <!-- حالة جاهز للتحميل -->
          <div class="state-ready" id="stateReady">
            <div class="ready-row">
              <div class="ready-icon"><i class="fas fa-circle-check"></i></div>
              <div>
                <div class="ready-title">جاهز للتحميل</div>
                <div class="ready-sub">حمّل التطبيق الآن وابدأ رحلتك</div>
              </div>
            </div>
            <!-- ⬇️ ضع رابط تحميل التطبيق هنا ⬇️ -->
            <a href="#" id="downloadLink" class="download-btn" target="_blank" rel="noopener">
              <i class="fas fa-arrow-down-to-line"></i>
              تحميل التطبيق
            </a>
            <button class="replay-link" id="replayBtn">
              <i class="fas fa-rotate-left"></i>
              إعادة مشاهدة الفيديو
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const video = document.getElementById('mainVideo');
      const progressFill = document.getElementById('progressFill');
      const timeElapsed = document.getElementById('timeElapsed');
      const timeTotal = document.getElementById('timeTotal');
      const stateWatching = document.getElementById('stateWatching');
      const stateReady = document.getElementById('stateReady');
      const boardStatus = document.getElementById('boardStatus');
      const boardStatusText = document.getElementById('boardStatusText');
      const soundFallback = document.getElementById('soundFallback');
      const replayBtn = document.getElementById('replayBtn');

      const arDigits = ['٠','١','٢','٣','٤','٥','٦','٧','٨','٩'];
      function toArabicNum(str) {
        return str.replace(/[0-9]/g, d => arDigits[d]);
      }
      function formatTime(sec) {
        if (!isFinite(sec) || sec < 0) sec = 0;
        const m = Math.floor(sec / 60);
        const s = Math.floor(sec % 60);
        return toArabicNum(`${m}:${s.toString().padStart(2, '0')}`);
      }

      function setBoardStatus(text, done) {
        boardStatusText.style.animation = 'none';
        requestAnimationFrame(() => {
          boardStatusText.textContent = text;
          boardStatusText.style.animation = '';
        });
        boardStatus.classList.toggle('done', !!done);
      }

      function showReadyState() {
        stateWatching.style.display = 'none';
        stateReady.classList.add('show');
        setBoardStatus('انتهى — جاهز', true);
      }

      function showWatchingState() {
        stateReady.classList.remove('show');
        stateWatching.style.display = 'flex';
        setBoardStatus('يتم التشغيل', false);
      }

      video.addEventListener('loadedmetadata', () => {
        timeTotal.textContent = formatTime(video.duration);
      });

      video.addEventListener('timeupdate', () => {
        if (video.duration) {
          const pct = (video.currentTime / video.duration) * 100;
          progressFill.style.width = pct + '%';
        }
        timeElapsed.textContent = formatTime(video.currentTime);
      });

      video.addEventListener('ended', showReadyState);

      replayBtn.addEventListener('click', () => {
        showWatchingState();
        video.currentTime = 0;
        video.muted = false;
        video.play().catch(() => {});
      });

      function attemptAutoplay() {
        video.muted = false;
        const playPromise = video.play();
        if (playPromise !== undefined) {
          playPromise.catch(() => {
            video.muted = true;
            video.play().catch(() => {});
            soundFallback.classList.add('show');
          });
        }
      }

      soundFallback.addEventListener('click', () => {
        video.muted = false;
        video.play().catch(() => {});
        soundFallback.classList.remove('show');
      });

      window.addEventListener('DOMContentLoaded', attemptAutoplay);
      video.addEventListener('canplay', attemptAutoplay, { once: true });

      // نجوم الخلفية
      const wrap = document.getElementById('stars');
      for (let i = 0; i < 40; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        const size = Math.random() * 2 + 0.6;
        s.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*55}%;animation-delay:${Math.random()*3}s;animation-duration:${2.6+Math.random()*2.4}s;`;
        wrap.appendChild(s);
      }
    })();
  </script>
</body>
</html>
